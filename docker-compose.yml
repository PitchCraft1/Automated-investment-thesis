version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: investment-thesis-postgres
    environment:
      POSTGRES_DB: investment_thesis
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mailhog:
    image: mailhog/mailhog:latest
    container_name: investment-thesis-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data:
